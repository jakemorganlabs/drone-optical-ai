# Phase 5 (manual Part 6.2) — WireGuard-over-Starlink for Tier-3 traffic.
#
# This is a PLACEHOLDER config. Real Private/PublicKey values are generated
# by ops at provisioning time (see server/README.md). Drop the real keys here
# and copy to /etc/wireguard/wg0.conf on the ground box:
#
#   sudo cp wireguard.example.conf /etc/wireguard/wg0.conf
#   sudo chmod 600 /etc/wireguard/wg0.conf
#   sudo wg-quick up wg0
#
# Network summary (manual Part 6.2):
#   10.8.0.0/30  — fiber tether LAN, drone/ground (/30 per drone pair)
#   10.9.0.0/24  — WireGuard overlay for Tier-3 (server <-> ground box)
#
# NOTHING flight-critical rides wg0. The tether (10.8.x) carries telemetry +
# teleop + goals; the WAN behind wg0 carries: operator -> /mission (LLM),
# operator -> /fleet (scrape), and server -> coordinator goal pushes. If wg0
# goes down (Starlink drop) the drones continue on onboard CfC toward their
# last goal and the operator still has direct fiber teleop. No freeze, no fall.

[Interface]
# Ground box side. The ground box dials out (Starlink CGNAT -> the server
# holds the public / rendezvous endpoint), so it needs only its own private
# key + a tunnel address inside the wg overlay.
PrivateKey = GROUND_BOX_PRIVATE_KEY_PLACEHOLDER_0123456789ABCDEF
Address    = 10.9.0.2/24
# Optional: tighten MTU for Starlink's variable MSS (1420 is the safe default).
MTU         = 1420

[Peer]
# The self-hosted AI server (holds the public endpoint; NAT-traversal
# rendezvous). The ground box only ever needs to reach this peer.
PublicKey       = SERVER_PUBLIC_KEY_PLACEHOLDER_0123456789ABCDEF
Endpoint        = your.server.example:51820
AllowedIPs      = 10.9.0.0/24
# Keepalive 25s punches through Starlink NAT/stateful firewalls so the
# server can dial back in (though by design the ground box is the initiator).
PersistentKeepalive = 25


# ---------------------------------------------------------------------------
# Mirror block (provisioning reference — DO NOT paste into the real wg0.conf)
# ---------------------------------------------------------------------------
# On the SERVER side, the matching wg0.conf block looks like:
#
#   [Interface]
#   PrivateKey = SERVER_PRIVATE_KEY_PLACEHOLDER_0123456789ABCDEF
#   Address    = 10.9.0.1/24
#   ListenPort = 51820
#
#   [Peer]   # ground box
#   PublicKey       = GROUND_BOX_PUBLIC_KEY_PLACEHOLDER_0123456789ABCDEF
#   AllowedIPs      = 10.9.0.2/32
#   # No Endpoint: the server learns the ground box's address from the
#   # first handshake (the ground box keeps PersistentKeepalive=25 ticking).
#
# Provisioning flow:
#   1. On the ground box:
#        wg genkey | tee ground_box.priv | wg pubkey > ground_box.pub
#   2. On the server:
#        wg genkey | tee server.priv    | wg pubkey > server.pub
#   3. Exchange the two *.pub files out of band (they are not secret).
#   4. Paste keys into the [Interface]/[Peer] blocks above + the server's
#      mirror block, deploy, then `wg-quick up wg0` on both sides.
#   5. Sanity: `ping 10.9.0.1` from the ground box.