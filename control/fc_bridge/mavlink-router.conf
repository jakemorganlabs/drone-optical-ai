# /etc/mavlink-router/main.conf
#
# Multiplexes the single flight-controller UART/USB link so multiple consumers
# (this bridge, QGroundControl over the tether, a logger, ...) can share it.
# Install the config the Pi ships at /etc/mavlink-router/main.conf. The onboard
# MAVSDK bridge (control/fc_bridge) connects to the onboard UDP endpoint below.

[General]
TcpServerPort=5760

# Flight controller on TELEM2 (or a spare UART). 921600 baud is the recommended
# rate for offboard control; lower bauds starve the setpoint stream.
[UartEndpoint fc]
Device=/dev/ttyAMA0
Baud=921600

# Onboard endpoint this companion computer + MAVSDK connect to.
[UdpEndpoint onboard]
Mode=Normal
Address=127.0.0.1
Port=14540