name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  make:
    name: Make build + test (Linux, gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt update
          sudo apt install -y build-essential libomp-dev

      - name: Build (Make)
        run: make

      - name: Run full Make test suite
        run: make test

  cmake:
    name: CMake configure + build (Linux, reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake libomp-dev

      - name: Configure (CMake)
        # Option gates default OFF (manual Part 9.2): a bare configure with
        # no external deps installed must succeed. MAVSDK + onnxruntime are
        # deliberately not installed here so the gates stay closed. A
        # wrapped build turns the options on explicitly:
        #   -DDRONECTL_ENABLE_FC_BRIDGE=ON -DDRONECTL_ENABLE_CFC=ON
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release .

      - name: Build (CMake)
        run: cmake --build build --config Release

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

  rpi-cross:
    name: Cross-compile for Raspberry Pi (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Build (Make)
        run: make CXX=aarch64-linux-gnu-g++ CXXFLAGS="-std=c++17 -O3"
      - name: Verify binary
        run: file build/embedded_voxel_mapper