# =============================================================================
# wg0.example.conf — Option A Phase 5 ground-box WireGuard over Starlink
# ----------------------------------------------------------------------------
# Manual Part 6.2. This is an ANNOTATED TEMPLATE, not a usable config.
#
#   *** Replace every <PLACEHOLDER> before deploying. ***
#
# WireGuard carries all Tier-3 (non-flight-critical) traffic between the
# ground box and the self-hosted AI server: goal plans down, telemetry +
# map deltas + re-task context up. Nothing in the closed flight loop rides
# wg0 — if Starlink or wg0 drops, every drone continues its last goal on
# the onboard CfC and the operator still has full fiber teleop (manual
# Part 6.4). No freeze, no fall.
#
# Key generation (run once, on each peer):
#   umask 077 && wg genkey | tee privatekey | wg pubkey > publickey
#   # ground box:  -> ground_priv / ground_pub
#   # server     :  -> server_priv / server_pub
#
# Topology (manual Part 6.1):
#
#   drone(s) ──fiber──► ground box [coordinator + wg0] ──Starlink──► [wg0] self-hosted AI server
#                                              (CGNAT-friendly: ground dials out, server holds public endpoint)
# =============================================================================

# --- Ground box peer (this file lives on the ground box) ---------------------
[Interface]
# Ground box WireGuard private key. KEEP SECRET. Never commit a real key.
# Generate with: wg genkey
PrivateKey = <ground_priv>

# Ground box VPN address inside the wg0 /24. The server reaches the
# coordinator and the drones' loopback forwarders through this address.
Address = 10.9.0.2/24

# Listen port is left unset on the ground box: Starlink is usually behind
# CGNAT, so the ground box DIALS OUT to the server. The server is the peer
# that holds the public endpoint. (If you have a routable Starlink IP and
# want the server to dial in instead, add ListenPort = 51820 here and set
# the server peer up symmetrically.)

# Optional: mark wg0 traffic DSCP EF so Starlink's scheduler prefers it for
# the low-latency goal/telemetry path. Video stays best-effort (manual Part
# 6.4 — video is on-demand, never in the broadcast fleet path).
# Table = auto   # default; leave alone unless you want custom routing.

# --- Self-hosted AI server (the peer) ----------------------------------------
[Peer]
# Server WireGuard public key. Share freely; it is not secret.
PublicKey = <server_pub>

# Public endpoint of the self-hosted AI server. Must be reachable from the
# Starlink egress. If the server itself is also behind NAT, use a
# Tailscale/Headscale DERP rendezvous or a small VPS as a relay.
Endpoint = your.server.example:51820

# Route the whole VPN /24 through this peer (so the server and any other
# ground boxes / observability boxes on the VPN are reachable).
AllowedIPs = 10.9.0.0/24

# Keep the NAT mapping warm. Starlink CGNAT will time out idle mappings;
# 25 s keepalives keep the tunnel upright through normal idle periods.
PersistentKeepalive = 25

# =============================================================================
# Mirror config (server side) — for reference. Lives on the server as its own
# /etc/wireguard/wg0.conf, NOT in this repo's deployed copy.
# -----------------------------------------------------------------------------
# [Interface]
# PrivateKey = <server_priv>
# Address     = 10.9.0.1/24
# ListenPort = 51820
#
# [Peer]
# PublicKey      = <ground_pub>
# AllowedIPs     = 10.9.0.2/32      # restrict to this ground box
# # No Endpoint: the server accepts the ground box's dial-out.
# # No PersistentKeepalive: the server is the stationary peer.
# =============================================================================

# =============================================================================
# Bringing it up (ground box):
#   sudo cp wg0.example.conf /etc/wireguard/wg0.conf   # after key replacement
#   sudo wg setconf wg0 /etc/wireguard/wg0.conf
#   sudo wg-quick up wg0
# Verify:
#   sudo wg show           # latest handshake, transfer stats
#   ping 10.9.0.1           # server must answer
#
# Tearing it down for the "Starlink down" degradation test (manual Part 6.4):
#   sudo wg-quick down wg0
# Expected: drones keep flying on the onboard CfC toward their last goals;
# operator teleop over the fiber is unaffected; no freeze, no fall.
# =============================================================================